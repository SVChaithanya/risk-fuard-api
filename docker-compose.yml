services:
  db:
    image: postgres:15
    container_name: funds-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: surya_851973
      POSTGRES_DB: funds_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: funds-app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:surya_851973@db:5432/funds_db

volumes:
  postgres_data: